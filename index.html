<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <link rel="icon" href="resources/favicon.ico" type="image/x-icon" sizes="96x96"/>
    <title>Blog Card</title>
    <link rel="stylesheet" href="styles.css">

    <!-- Google Fonts: Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Sora:wght@100..800&display=swap" rel="stylesheet">
  </head>
  <body class="grid-container">
      <main class="flex-card-container">
        <div class="card-image">
          <img src="resources/Cactus.jpg" alt="cactus image">
        </div>
        <div class="card-button">
          <p class="button-text">Design</p>
        </div>
        <h2>Embracing Minimalism</h2>
        <p>From minimalist sculptures to minimalist paintings, this blog will inspire you to appreciate the beauty that lies in simplicity.</p>
        <div class="separator"></div>
        <div class="author">
          <p class="author-name">Annie Spratt</p>
        </div> 
      </main>
  </body>
</html>
